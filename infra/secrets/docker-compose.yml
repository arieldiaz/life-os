# Self-hosted Infisical — single source of truth for ariel-os secrets.
# Runs on ariel-mini under Colima. See runbook.md for operations.
#
# Port map: host 8090 -> container 8080 (host 8080 = Runshot, 8088 = Superset).
# Postgres and Redis are NEVER exposed on the host — compose network only.
#
# Image is version-pinned; upgrade procedure in runbook.md § Upgrades.

name: infisical

services:
  db-migration:
    image: infisical/infisical:v0.161.14
    container_name: infisical-db-migration
    depends_on:
      db:
        condition: service_healthy
    command: npm run migration:latest
    env_file: .env
    environment:
      - DB_CONNECTION_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - infisical

  backend:
    image: infisical/infisical:v0.161.14
    container_name: infisical-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      db-migration:
        condition: service_completed_successfully
    env_file: .env
    environment:
      - NODE_ENV=production
      - DB_CONNECTION_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8090:8080"
    networks:
      - infisical

  db:
    image: postgres:14-alpine
    container_name: infisical-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 10
    networks:
      - infisical

  redis:
    image: redis:7-alpine
    container_name: infisical-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - infisical

volumes:
  pg_data:
  redis_data:

networks:
  infisical:
